# 통합테스트 프로파일 — 실제 시크릿(application-secret.yaml) 없이 컨텍스트가 뜨도록
# 더미 값 제공. datasource는 Testcontainers @ServiceConnection이 동적으로 주입한다.
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
          naver:
            client-id: test-naver-client-id
            client-secret: test-naver-client-secret
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-client-secret

jwt:
  issuer: clov-api-test
  secret: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

# 더미 R2 설정 — 서명은 로컬 계산이라 네트워크 없이 presign URL 형태를 검증할 수 있다.
app:
  storage:
    endpoint: https://test-account.r2.cloudflarestorage.com
    region: auto
    bucket: clov-media
    access-key: test-access-key-id
    secret-key: test-secret-access-key
    public-base-url: https://pub-testhash.r2.dev/
