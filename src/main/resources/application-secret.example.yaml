# Copy this file to application-secret.yaml and replace every placeholder.
# application-secret.yaml is local-only and must never be committed.
spring:
  datasource:
    url: jdbc:mysql://DB_HOST:3306/DB_NAME?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
