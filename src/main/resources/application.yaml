spring:
  application:
    name: clov-api
  profiles:
    include:
      - secret
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope: openid, profile, email
          naver:
            client-id: ${OAUTH_NAVER_CLIENT_ID:}
            client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            client-name: Naver
            scope: name, email
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID:}
            client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope: profile_nickname, account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    redirect-url: http://localhost:5173/oauth2/redirect

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.korit.clovapi.domain
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: "NULL"
