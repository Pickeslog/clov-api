spring:
  application:
    name: clov-api
  datasource:
    hikari:
      connection-init-sql: SET time_zone = '+00:00'
  profiles:
    include:
      - secret
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
            client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope: openid, profile, email
          naver:
            client-id: ${OAUTH_NAVER_CLIENT_ID:}
            client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            client-name: Naver
            scope: name, email
          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID:}
            client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope: profile_nickname, account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    redirect-url: http://localhost:5173/oauth2/redirect
  storage:
    # 실제 값은 application-secret.yaml(로컬 전용)에서 주입한다. R2는 region=auto.
    endpoint: ${APP_STORAGE_ENDPOINT:}
    region: ${APP_STORAGE_REGION:auto}
    bucket: ${APP_STORAGE_BUCKET:clov-media}
    access-key: ${APP_STORAGE_ACCESS_KEY:}
    secret-key: ${APP_STORAGE_SECRET_KEY:}
    public-base-url: ${APP_STORAGE_PUBLIC_BASE_URL:}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.korit.clovapi.domain.auth.entity,com.korit.clovapi.domain.room.entity,com.korit.clovapi.domain.invite.entity,com.korit.clovapi.domain.plan.entity,com.korit.clovapi.domain.memory.entity,com.korit.clovapi.domain.letter.entity,com.korit.clovapi.domain.notification.entity,com.korit.clovapi.domain.user.entity
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: "NULL"
