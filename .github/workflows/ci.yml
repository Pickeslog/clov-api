name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile main + test sources
        run: ./gradlew compileJava compileTestJava --no-daemon
      # NOTE: 통합 테스트(@SpringBootTest)는 공유 DB(application-secret.yaml)가 필요해
      # GitHub 러너에서 실행 불가. `./gradlew test`는 로컬에서 돌린다.
      # 추후 Testcontainers(MySQL)로 CI 테스트 실행을 붙일 수 있음.
