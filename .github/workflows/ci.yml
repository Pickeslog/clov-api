name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        run: ./gradlew test --no-daemon
      # 통합 테스트(@SpringBootTest)는 Testcontainers(MySQL)로 DB를 띄운다
      # (ubuntu-latest 러너에 Docker 상주). schema.sql로 초기화 → 공유 DB 불필요.
      # 순수 단위 테스트(JwtTokenProvider·GlobalResponseEnvelope)는 컨테이너 없이 실행.
