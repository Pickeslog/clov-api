# Clov 단일 오리진 nginx 설정 — clovlabcalss.store
# 배포: /etc/nginx/sites-available/clov 에 복사 → sites-enabled 심볼릭 링크 → nginx -t → reload
# HTTPS(443)와 80→443 리다이렉트는 `certbot --nginx`가 이 파일을 자동 수정해 추가한다.
# (그 전까지는 아래 80 포트로 동작)

server {
    listen 80;
    listen [::]:80;
    server_name clovlabcalss.store www.clovlabcalss.store;

    # ── 프론트 정적(SPA) ── clov-web 빌드 산출물 dist/를 여기에 배포
    root /var/www/clov;
    index index.html;

    client_max_body_size 15m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── 백엔드(Spring Boot :8080) 프록시 ──
    # 공통 프록시 헤더(X-Forwarded-*는 Spring forward-headers-strategy가 HTTPS 스킴 인식에 사용)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
    # 소셜 로그인 시작 — /oauth2/authorization/{provider} (주의: /oauth2/redirect는 프론트라 제외)
    location /oauth2/authorization/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }
    # provider 콜백 — /login/oauth2/code/{provider}
    location /login/oauth2/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # 해시 파일명 정적 자원은 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA 클라이언트 라우팅 ── 없는 경로는 index.html로(/oauth2/redirect 포함)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
